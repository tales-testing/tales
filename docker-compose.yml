services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tales
      POSTGRES_PASSWORD: tales
      POSTGRES_DB: tales
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tales -d tales"]
      interval: 1s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: tales
      MYSQL_DATABASE: tales
      MYSQL_USER: tales
      MYSQL_PASSWORD: tales
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -utales -ptales --silent"]
      interval: 1s
      timeout: 3s
      retries: 30
