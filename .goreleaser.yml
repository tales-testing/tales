version: 2
project_name: tales

before:
  hooks:
    - go mod download

builds:
  - id: tales
    main: ./cmd/tales
    binary: tales
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tales-testing/tales/internal/version.version={{.Version}}
      - -X github.com/tales-testing/tales/internal/version.gitCommit={{.FullCommit}}
      - -X github.com/tales-testing/tales/internal/version.gitTreeState=clean
      - -X github.com/tales-testing/tales/internal/version.buildDate={{.Date}}

archives:
  - id: default
    ids:
      - tales
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^style:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  # owner / name are intentionally omitted so GoReleaser auto-detects
  # them from the workflow git remote. Hardcoding them broke v0.1.0-rc.2
  # after the repo was renamed: GitHub redirects API GETs across a rename
  # but POSTs (asset upload) drop the body on 307, so binary upload
  # silently failed.
  draft: false
  prerelease: auto

brews:
  - name: tales
    ids:
      - default
    repository:
      owner: tales-testing
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://taleslabs.org"
    description: "Declarative integration and e2e testing with .tales files"
    license: "MIT"
    # Skip pushing the formula for prereleases (rc / beta / alpha tags).
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: brew formula update for {{ .ProjectName }} {{ .Tag }}"
    install: |
      bin.install "tales"
    test: |
      assert_match "tales version: #{version}", shell_output("#{bin}/tales --version")
