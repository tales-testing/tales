version: 2
project_name: tales

before:
  hooks:
    - go mod download

builds:
  - id: tales
    main: ./cmd/tales
    binary: tales
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/hyperxlab/tales/internal/version.version={{.Version}}
      - -X github.com/hyperxlab/tales/internal/version.gitCommit={{.FullCommit}}
      - -X github.com/hyperxlab/tales/internal/version.gitTreeState=clean
      - -X github.com/hyperxlab/tales/internal/version.buildDate={{.Date}}

archives:
  - id: default
    ids:
      - tales
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^style:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  # owner / name are intentionally omitted so GoReleaser auto-detects
  # them from the workflow git remote. Hardcoding them broke v0.1.0-rc.2
  # after the repo moved from hyperxlab/tales to tales-testing/tales:
  # GitHub redirects API GETs across the rename but POSTs (asset upload)
  # drop the body on 307, so binary upload silently failed.
  draft: false
  prerelease: auto
