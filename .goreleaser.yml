version: 2
project_name: tales

before:
  hooks:
    - go mod download

builds:
  - id: tales
    main: ./cmd/tales
    binary: tales
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tales-testing/tales/internal/version.version={{.Version}}
      - -X github.com/tales-testing/tales/internal/version.gitCommit={{.FullCommit}}
      - -X github.com/tales-testing/tales/internal/version.gitTreeState=clean
      - -X github.com/tales-testing/tales/internal/version.buildDate={{.Date}}

archives:
  - id: default
    ids:
      - tales
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^style:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  # owner / name are intentionally omitted so GoReleaser auto-detects
  # them from the workflow git remote. Hardcoding them broke v0.1.0-rc.2
  # after the repo was renamed: GitHub redirects API GETs across a rename
  # but POSTs (asset upload) drop the body on 307, so binary upload
  # silently failed.
  draft: false
  prerelease: auto

# homebrew_casks replaces the deprecated `brews` section (soft-deprecated
# since GoReleaser v2.10, hard at v2.16). Casks are the recommended way
# to distribute pre-compiled binaries via Homebrew, including for Linux.
# Migration notes:
#   - `binary` (formula) becomes `binaries` (cask).
#   - The explicit `install: bin.install ...` block goes away — the cask
#     installs every entry in `binaries` automatically.
#   - `test` is not used (casks don't run formula-style tests).
#   - The binaries are not Apple-signed / notarized, so a post-install
#     hook strips the macOS Gatekeeper quarantine attribute. Without it,
#     `tales --version` on macOS triggers the "developer cannot be
#     verified" prompt the first time it runs.
#   - `url.verified` is required because the homepage domain
#     (taleslabs.org) differs from the download domain (github.com);
#     omitting it triggers a `homebrew audit` warning on the tap.
homebrew_casks:
  - name: tales
    ids:
      - default
    repository:
      owner: tales-testing
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://taleslabs.org"
    description: "Declarative integration and e2e testing with .tales files"
    url:
      verified: "github.com/tales-testing/tales/"
    # Skip pushing for prereleases (rc / beta / alpha tags).
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: brew cask update for {{ .ProjectName }} {{ .Tag }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tales"]
          end
