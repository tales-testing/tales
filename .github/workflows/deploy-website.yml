name: Deploy website

on:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

# Single concurrent deployment per branch — newer pushes cancel queued runs.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        env:
          # GitHub Pages publishes the project page at <user>.github.io/<repo>.
          # SITE_URL is the host root; BASE_PATH is the repo sub-path.
          # Override both in workflow_dispatch inputs for custom domains.
          SITE_URL: https://tales-testing.github.io
          BASE_PATH: /tales
        run: bun run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
