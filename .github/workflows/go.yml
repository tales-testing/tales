name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tales
          POSTGRES_PASSWORD: tales
          POSTGRES_DB: tales
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tales -d tales"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: tales
          MYSQL_DATABASE: tales
          MYSQL_USER: tales
          MYSQL_PASSWORD: tales
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -utales -ptales --silent"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 30

    env:
      POSTGRES_DSN: postgres://tales:tales@127.0.0.1:5432/tales?sslmode=disable
      MYSQL_DSN: tales:tales@tcp(127.0.0.1:3306)/tales?parseTime=true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -race -v ./...

      - name: Test
        run: go test -race -cover -coverprofile ./coverage.out ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=300s

      - name: E2E
        run: make e2e
      # - name: Coveralls
      #  uses: shogo82148/actions-goveralls@v1
      #  with:
      #    path-to-profile: coverage.out
